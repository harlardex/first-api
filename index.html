<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femco Store</title>
    <link rel="stylesheet" href="api.css">
</head>
<body>
    <div id="products">
        <div class="product">
            <img src="images/product_1.jpg" alt="product 1">
            <h2>Product X</h2>
            <h3>Category: footballer</h3>
            <p>Erling Haaland of Manchester City</p>
            <p class="price">Price: $999,999.00</p>
            <button>Buy Now</button>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://fakeapi.net';
        const finalUrl = BASE_URL + '/products';

        const fetchProducts = async() => {
            try {
                const response = await fetch(finalUrl);
                // console.log(response);

                if (!response.ok) {
                    throw new Error (`HTTPS error! status: ${response.status}`)
                }
                const products = await response.json();

                console.log('products', products);
                const productsData = products.data;
                console.log('productsData', productsData);

                const productContainer = document.getElementById('products')
                productsData.forEach((product) => {
                    const productElement = document.createElement('div');
                    productElement.classList.add('product');
                    productElement.innerHTML = 
                                `<img src="${product.image}" alt="${product.title}">
                                <h2>${product.title}</h2>
                                <h3>Category: ${product.category}</h3>
                                <p>${product.description}</p>
                                <p class="price">Price: $${product.price}</p>
                                <button>Buy Now</button>
                                `;
                    productContainer.appendChild(productElement)
                });                
            }
            catch (error) {
                console.error(`Error fetching products:`, error);
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            fetchProducts();
        })
    </script>
</body>
</html>
